<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permission Denied</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }

        .error-icon {
            font-size: 4rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 10px;
        }

        .error-message {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-back {
            background-color: #667eea;
            border-color: #667eea;
            color: white;
            padding: 10px 30px;
            font-size: 1.05rem;
        }

        .btn-back:hover {
            background-color: #764ba2;
            border-color: #764ba2;
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">⛔</div>
        <h1 class="error-title">Permission Denied</h1>
        <p class="error-message">
            You do not have permission to access this chat room.
        </p>
        <a href="{% url 'chat:chat-list' %}" class="btn btn-back">
            Back to Chat Rooms
        </a>
    </div>
</body>
</html>

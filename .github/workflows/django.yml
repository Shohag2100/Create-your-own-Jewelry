name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Local Test Image
        run: |
          # Build using the exact Dockerfile we forced Git to track
          docker build -t mishohag/jewelry-web:test .

      - name: Run Django System Checks Inside Container
        run: |
          # This runs the integrity test inside the actual container environment
          docker run --rm mishohag/jewelry-web:test python manage.py check

      - name: Push Verified Production Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jewelry-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jewelry-web:${{ github.sha }}
